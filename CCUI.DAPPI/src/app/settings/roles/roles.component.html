<header class="header">
  <div class="title-block">
    <h1>Roles</h1>
    <p>Manage User roles</p>
  </div>
  <button class="create-button" (click)="addRole()" [disabled]="rolesLoading" aria-label="Add role">
    + Add role
  </button>
</header>

@if (rolesError) {
  <div class="error-message">{{ rolesError }}</div>
}

<div class="roles-table-container">
  @if (rolesLoading) {
    <div class="loading-indicator">
      <p>Loading roles...</p>
    </div>
  } @else if (!roles.length) {
    <div class="no-results">
      <p>No roles found.</p>
    </div>
  } @else {
    <table class="roles-table" role="table" aria-label="Roles table">
      <thead>
        <tr class="header-row">
          <th class="cell">Name</th>
          <th class="cell">Users</th>
          <th class="cell actions-cell"></th>
        </tr>
      </thead>
      <tbody>
        @for (role of roles; track role.Id) {
          <tr class="content-row">
            <td class="cell">{{ role.Name }}</td>
            <td class="cell"><span class="user-count-badge">{{ role.UserCount }}</span></td>
            <td class="cell actions-cell">
              <button
                class="delete-role-button"
                (click)="deleteRole(role)"
                [disabled]="deletingRoleId === role.Id || rolesLoading"
                aria-label="Delete role"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
