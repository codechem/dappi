<header class="header">
  <div class="title-block">
    <h1>Media storage</h1>
    <p>Review where uploaded media files are stored</p>
  </div>
</header>

@if (error) {
  <div class="error-message">{{ error }}</div>
}

@if (isLoading) {
  <div class="content loading-content">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading storage source...</p>
  </div>
} @else {
  <div class="content-grid" aria-label="Data storage cards">
    <section class="storage-card" aria-label="Data storage details">
      <div class="storage-card__header">
        <h2>Current configuration</h2>
      </div>

      <div class="storage-card__row">
        <span class="storage-card__label">Media storage source</span>
        <span class="storage-card__value">{{ storageSource || 'Not available' }}</span>
      </div>
    </section>
  </div>
}
