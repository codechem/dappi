<div class="invite-user-dialog">
  <div class="dialog-header">
    <h2>{{ isCreateMode ? 'Create new user' : 'Invite new user' }}</h2>
    <button mat-icon-button (click)="onCancel()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-content">
    <hr />
    <mat-form-field appearance="outline" class="input-field">
      <mat-label>Username</mat-label>
      <input
        matInput
        [(ngModel)]="username"
        placeholder="Enter username"
        autofocus
        aria-label="Username"
      />
    </mat-form-field>
    <mat-form-field appearance="outline" class="input-field">
      <mat-label>Email</mat-label>
      <input
        matInput
        [(ngModel)]="email"
        type="email"
        placeholder="Enter email"
        aria-label="Email"
      />
    </mat-form-field>
    @if (isCreateMode) {
      <mat-form-field appearance="outline" class="input-field">
        <mat-label>Password</mat-label>
        <input
          matInput
          [(ngModel)]="password"
          type="password"
          placeholder="Enter password"
          aria-label="Password"
        />
      </mat-form-field>
    }
    <mat-form-field appearance="outline" class="input-field">
      <mat-label>Roles</mat-label>
      <mat-select
        [(ngModel)]="selectedRoles"
        multiple
        [disabled]="rolesLoading"
        aria-label="Roles"
      >
        @for (role of availableRoles; track role.Id) {
          <mat-option [value]="role.Name">{{ role.Name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <div class="dialog-footer">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button
      mat-flat-button
      class="confirm-button"
      (click)="onConfirm()"
      [disabled]="!isValid"
    >
      {{ isCreateMode ? 'Create' : 'Invite' }}
    </button>
  </div>
</div>
